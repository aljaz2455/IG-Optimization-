services:
  - type: web
    name: ig-optimization-dashboard
    runtime: static
    buildCommand: >
      mkdir -p public &&
      sed "s|__AIRTABLE_KEY__|$AIRTABLE_API_KEY|g; s|__DASH_PASS__|$DASHBOARD_PASS|g"
      dashboard.html > public/index.html
    staticPublishPath: public
    pullRequestPreviewsEnabled: false
    envVars:
      - key: AIRTABLE_API_KEY
        sync: false
      - key: DASHBOARD_PASS
        sync: false
